name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Automated Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.10.2

    - name: Inject Gemini API Key Configuration
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties

    - name: Assemble Debug Package Binaries
      run: gradle assembleDebug

    - name: Upload Compiled Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ForgeNote-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
